## Étape 6 — Créer le CLAUDE.md

1. **"Add file"** → **"Create new file"**
2. Nom : `CLAUDE.md`
3. Colle le contenu du `CLAUDE.md` que je t'ai donné juste avant
4. **"Commit changes"**


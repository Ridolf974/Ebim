## Étape 7 — Lancer Claude Code 🚀

1. Dans ton dépôt → onglet **"Issues"** → **"New issue"**
2. **Title** : `Création du site vitrine EBIM`
3. **Description** :
```
@claude En te basant sur le CLAUDE.md, crée les fichiers index.html, style.css et script.js pour le site vitrine eBIM Ingénierie. Inclure toutes les sections : hero, présentation, services (6 missions), références, partenaires et contact. Style moderne et dynamique, responsive, avec animations au scroll. Logo à récupérer depuis https://ebim-ing.re/images/ebim-logo.svg
